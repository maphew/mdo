name: Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy GitHub Pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      # Pinned action SHAs: use Dependabot github-actions PRs or `git ls-remote`
      # to refresh pins, and keep the version comments in sync.
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Build mdo
        run: cargo build --release --locked

      - name: Generate checked-in docs HTML
        env:
          MDO_BIN: ./target/release/mdo
        run: python3 scripts/build-docs.py

      - name: Generate ADR HTML
        env:
          MDO_BIN: ./target/release/mdo
        run: |
          for adr in docs/adr/*.md; do
            "$MDO_BIN" --css docs/assets/site.css "$adr"
          done

      - name: Configure Pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5

      - name: Upload static site
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: docs

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
