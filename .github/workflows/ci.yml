name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    name: Format, lint, test, and package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        # actions/checkout v5
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - name: Install Rust
        # dtolnay/rust-toolchain stable
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30
        with:
          components: clippy, rustfmt

      - name: Cache Rust build artifacts
        # Swatinem/rust-cache v2
        uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae

      - name: Install cargo-audit
        # taiki-e/install-action v2
        uses: taiki-e/install-action@2ca9b94c269419b7b0c711c09d0b21c4e1d51145
        with:
          tool: cargo-audit

      - name: Audit Rust dependencies
        run: cargo audit --deny warnings

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run tests
        run: cargo test --all-targets --all-features --locked

      - name: Run Python tests
        run: python3 -m unittest discover -s tests -p 'test_*.py'

      - name: Verify crate package
        run: cargo package --locked

  windows-check:
    name: Windows build and test
    runs-on: windows-latest

    steps:
      - name: Checkout
        # actions/checkout v5
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - name: Install Rust
        # dtolnay/rust-toolchain stable
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30

      - name: Cache Rust build artifacts
        # Swatinem/rust-cache v2
        uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae

      # Building the test binaries exercises every cfg(windows) code path
      # (including cfg(test) modules), and running them covers registry
      # command construction, wrapper argument forwarding/error propagation,
      # and setup-launcher argument construction with pure, seam-based unit
      # tests that never touch the real registry or spawn a real terminal.
      - name: Run Windows tests
        run: cargo test --all-targets --all-features --locked
