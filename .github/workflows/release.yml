name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            exe_suffix: ""
          - os: macos-13
            target: x86_64-apple-darwin
            exe_suffix: ""
          - os: macos-latest
            target: aarch64-apple-darwin
            exe_suffix: ""
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            exe_suffix: ".exe"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Test
        run: cargo test --locked

      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Stage artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/mdo${{ matrix.exe_suffix }}" "dist/mdo-${{ matrix.target }}${{ matrix.exe_suffix }}"
          if [ "${{ matrix.target }}" = "x86_64-pc-windows-msvc" ]; then
            cp "target/${{ matrix.target }}/release/mdo-open.exe" "dist/mdo-open-${{ matrix.target }}.exe"
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mdo-${{ matrix.target }}
          path: dist/*
          if-no-files-found: error

  release:
    name: Create GitHub release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          gh release create "$TAG_NAME" dist/* \
            --repo "$GITHUB_REPOSITORY" \
            --title "mdo $TAG_NAME" \
            --generate-notes \
            --verify-tag
