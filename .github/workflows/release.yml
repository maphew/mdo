name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to release, such as v0.2.0"
        required: true
        type: string
      prerelease:
        description: "Mark the GitHub release as a prerelease"
        required: false
        default: false
        type: boolean

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.asset }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset: mdo-x86_64-unknown-linux-gnu
            archive: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset: mdo-x86_64-pc-windows-msvc
            archive: zip
          - os: macos-latest
            target: universal-apple-darwin
            asset: mdo-universal-apple-darwin
            archive: tar.gz

    steps:
      - name: Checkout
        # actions/checkout v5
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          ref: refs/tags/${{ env.RELEASE_TAG }}
          persist-credentials: false

      - name: Install Rust
        # dtolnay/rust-toolchain stable
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          targets: ${{ matrix.target == 'universal-apple-darwin' && 'x86_64-apple-darwin,aarch64-apple-darwin' || matrix.target }}

      - name: Cache Rust build artifacts
        # Swatinem/rust-cache v2
        uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae

      - name: Test
        run: cargo test --locked

      - name: Build release binaries
        if: matrix.target != 'universal-apple-darwin'
        run: cargo build --release --locked --target "${{ matrix.target }}"

      - name: Build macOS universal release binaries
        if: matrix.target == 'universal-apple-darwin'
        shell: bash
        run: |
          set -euo pipefail
          cargo build --release --locked --target x86_64-apple-darwin
          cargo build --release --locked --target aarch64-apple-darwin

      - name: Package Unix archive
        if: matrix.archive == 'tar.gz' && matrix.target != 'universal-apple-darwin'
        shell: bash
        run: |
          set -euo pipefail
          asset="${{ matrix.asset }}"
          staging="target/dist/${asset}"
          mkdir -p "${staging}"
          cp "target/${{ matrix.target }}/release/mdo" "${staging}/"
          cp "target/${{ matrix.target }}/release/mdo-open" "${staging}/"
          cp "target/${{ matrix.target }}/release/mdo-setup" "${staging}/"
          cp README.md CHANGELOG.md LICENSE-MIT LICENSE-APACHE "${staging}/"
          cp assets/mdo-default-typography.css "${staging}/"
          cp assets/restore-simple-css.css "${staging}/"
          tar -C target/dist -czf "target/dist/${asset}.tar.gz" "${asset}"

      - name: Package macOS universal archive
        if: matrix.target == 'universal-apple-darwin'
        shell: bash
        run: |
          set -euo pipefail
          asset="${{ matrix.asset }}"
          staging="target/dist/${asset}"
          mkdir -p "${staging}"
          lipo -create \
            -output "${staging}/mdo" \
            target/x86_64-apple-darwin/release/mdo \
            target/aarch64-apple-darwin/release/mdo
          lipo -create \
            -output "${staging}/mdo-open" \
            target/x86_64-apple-darwin/release/mdo-open \
            target/aarch64-apple-darwin/release/mdo-open
          chmod +x "${staging}/mdo" "${staging}/mdo-open"
          cp README.md CHANGELOG.md LICENSE-MIT LICENSE-APACHE "${staging}/"
          cp assets/mdo-default-typography.css "${staging}/"
          cp assets/restore-simple-css.css "${staging}/"
          tar -C target/dist -czf "target/dist/${asset}.tar.gz" "${asset}"

      - name: Package Windows archive
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $asset = "${{ matrix.asset }}"
          $staging = "target/dist/$asset"
          New-Item -ItemType Directory -Force -Path $staging | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/mdo.exe" $staging
          Copy-Item "target/${{ matrix.target }}/release/mdo-open.exe" $staging
          Copy-Item "target/${{ matrix.target }}/release/mdo-setup.exe" $staging
          Copy-Item README.md, CHANGELOG.md, LICENSE-MIT, LICENSE-APACHE $staging
          Copy-Item assets/mdo-default-typography.css $staging
          Copy-Item assets/restore-simple-css.css $staging
          Compress-Archive -Path $staging -DestinationPath "target/dist/$asset.zip" -Force

      - name: Verify checkout matches release tag
        shell: bash
        run: |
          set -euo pipefail
          tag_commit="$(git rev-parse "${RELEASE_TAG}^{commit}")"
          head_commit="$(git rev-parse HEAD)"
          if [ "${head_commit}" != "${tag_commit}" ]; then
            echo "HEAD ${head_commit} does not match ${RELEASE_TAG} commit ${tag_commit}" >&2
            exit 1
          fi

      - name: Upload archive artifact
        # actions/upload-artifact v4
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: ${{ matrix.asset }}
          path: target/dist/${{ matrix.asset }}.${{ matrix.archive }}
          if-no-files-found: error
          retention-days: 7

  android-build:
    name: Build signed Android packages
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      ANDROID_SIGNING_ENABLED: ${{ vars.ANDROID_RELEASE_SIGNING_ENABLED }}
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

    steps:
      - name: Report disabled Android signing
        if: env.ANDROID_SIGNING_ENABLED != 'true'
        run: echo "Android release packaging is disabled; set ANDROID_RELEASE_SIGNING_ENABLED=true after configuring the four Android signing secrets."

      - name: Checkout
        if: env.ANDROID_SIGNING_ENABLED == 'true'
        # actions/checkout v5
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          ref: refs/tags/${{ env.RELEASE_TAG }}
          persist-credentials: false

      - name: Install JDK 17
        if: env.ANDROID_SIGNING_ENABLED == 'true'
        # actions/setup-java v4
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9
        with:
          distribution: temurin
          java-version: "17"

      - name: Install Android SDK tools
        if: env.ANDROID_SIGNING_ENABLED == 'true'
        # android-actions/setup-android v3
        uses: android-actions/setup-android@9fc6c4e9069bf8d3d10b2204b1fb8f6ef7065407

      - name: Install Android platform and NDK
        if: env.ANDROID_SIGNING_ENABLED == 'true'
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0" "ndk;28.2.13676358"

      - name: Install Rust Android target
        if: env.ANDROID_SIGNING_ENABLED == 'true'
        # dtolnay/rust-toolchain stable
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          targets: aarch64-linux-android

      - name: Install cargo-ndk
        if: env.ANDROID_SIGNING_ENABLED == 'true'
        # taiki-e/install-action v2
        uses: taiki-e/install-action@2ca9b94c269419b7b0c711c09d0b21c4e1d51145
        with:
          tool: cargo-ndk

      - name: Restore Android signing key
        if: env.ANDROID_SIGNING_ENABLED == 'true'
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          MDO_ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          MDO_ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          MDO_ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          for name in \
            ANDROID_KEYSTORE_BASE64 \
            MDO_ANDROID_KEYSTORE_PASSWORD \
            MDO_ANDROID_KEY_ALIAS \
            MDO_ANDROID_KEY_PASSWORD; do
              if [[ -z "${!name}" ]]; then
                echo "${name} is not configured" >&2
                exit 1
              fi
          done
          printf '%s' "${ANDROID_KEYSTORE_BASE64}" | base64 --decode > "${RUNNER_TEMP}/mdo-upload.jks"

      - name: Verify Android version matches release tag
        if: env.ANDROID_SIGNING_ENABLED == 'true'
        run: |
          set -euo pipefail
          tag_version="${RELEASE_TAG#v}"
          app_version="$(sed -nE 's/^[[:space:]]*versionName "([^"]+)"/\1/p' android/app/build.gradle)"
          if [[ "${app_version}" != "${tag_version}" ]]; then
            echo "Android versionName ${app_version} does not match release tag ${RELEASE_TAG}" >&2
            exit 1
          fi

      - name: Build signed APK and app bundle
        if: env.ANDROID_SIGNING_ENABLED == 'true'
        working-directory: android
        env:
          MDO_ANDROID_KEYSTORE: ${{ runner.temp }}/mdo-upload.jks
          MDO_ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          MDO_ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          MDO_ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew assembleRelease bundleRelease --stacktrace

      - name: Verify and stage Android packages
        if: env.ANDROID_SIGNING_ENABLED == 'true'
        run: |
          set -euo pipefail
          "${ANDROID_HOME}/build-tools/36.0.0/apksigner" verify --verbose --print-certs android/app/build/outputs/apk/release/app-release.apk
          jarsigner -verify -strict android/app/build/outputs/bundle/release/app-release.aab
          mkdir -p target/dist
          cp android/app/build/outputs/apk/release/app-release.apk target/dist/mdo-android-arm64.apk
          cp android/app/build/outputs/bundle/release/app-release.aab target/dist/mdo-android-arm64.aab

      - name: Upload Android release artifacts
        if: env.ANDROID_SIGNING_ENABLED == 'true'
        # actions/upload-artifact v4
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: mdo-android-arm64
          path: |
            target/dist/mdo-android-arm64.apk
            target/dist/mdo-android-arm64.aab
          if-no-files-found: error
          retention-days: 7

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [build, android-build]
    permissions:
      contents: write

    env:
      GH_TOKEN: ${{ github.token }}
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
      PRERELEASE: ${{ github.event_name == 'workflow_dispatch' && inputs.prerelease || false }}

    steps:
      - name: Checkout
        # actions/checkout v5
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          ref: refs/tags/${{ env.RELEASE_TAG }}
          persist-credentials: false

      - name: Download archive artifacts
        # actions/download-artifact v4
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          path: target/dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          python3 - <<'PY'
          from hashlib import sha256
          from pathlib import Path

          dist = Path("target/dist")
          files = sorted(p for p in dist.iterdir() if p.is_file())
          with (dist / "SHA256SUMS").open("w", encoding="utf-8") as out:
              for path in files:
                  out.write(f"{sha256(path.read_bytes()).hexdigest()}  {path.name}\n")
          PY

      - name: Verify checkout matches release tag
        run: |
          set -euo pipefail
          tag_commit="$(git rev-parse "${RELEASE_TAG}^{commit}")"
          head_commit="$(git rev-parse HEAD)"
          if [ "${head_commit}" != "${tag_commit}" ]; then
            echo "HEAD ${head_commit} does not match ${RELEASE_TAG} commit ${tag_commit}" >&2
            exit 1
          fi

      - name: Create or update release
        run: |
          set -euo pipefail
          release_flags=(--verify-tag --title "${RELEASE_TAG}" --generate-notes)
          if [[ "${PRERELEASE}" == "true" ]]; then
            release_flags+=(--prerelease)
          fi

          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            gh release upload "${RELEASE_TAG}" target/dist/* --clobber
          else
            gh release create "${RELEASE_TAG}" target/dist/* "${release_flags[@]}"
          fi
