name: Metrics

on:
  schedule:
    - cron: "17 8 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: metrics
  cancel-in-progress: false

jobs:
  collect:
    name: Collect public metrics
    runs-on: ubuntu-latest

    steps:
      # Pinned action SHAs: use Dependabot github-actions PRs or `git ls-remote`
      # to refresh pins, and keep the version comments in sync.
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Install Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Collect metrics
        env:
          METRICS_GITHUB_TOKEN: ${{ secrets.METRICS_GITHUB_TOKEN || github.token }}
        run: python3 scripts/collect-metrics.py

      - name: Commit metrics
        run: |
          set -euo pipefail
          if [ -z "$(git status --porcelain -- docs/metrics)" ]; then
            echo "No metrics changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/metrics
          git commit -m "Update public metrics"
          git push
